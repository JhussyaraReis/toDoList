<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="AppContainer">
      <div class="tituloContainer">
        <h1>ToDo List</h1>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="50"
          height="50"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-clipboard-list-icon lucide-clipboard-list"
        >
          <rect width="8" height="4" x="8" y="2" rx="1" ry="1" />
          <path
            d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
          />
          <path d="M12 11h4" />
          <path d="M12 16h4" />
          <path d="M8 11h.01" />
          <path d="M8 16h.01" />
        </svg>
      </div>

      <div class="addTaskContainer">
        <input
          type="text"
          class="inputAddTask"
          id="inputTask"
          placeholder="Digite uma tarefa..."
        />
        <button id="btnAddTask">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="35"
            height="35"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-plus-icon lucide-plus"
          >
            <path d="M5 12h14" />
            <path d="M12 5v14" />
          </svg>
        </button>
      </div>

      <ul class="listContainer" id="listContainer"></ul>

      <div class="footerContainer">
        <div class="counter">0 / 0</div>
        <div class="filterContainer">
          <button data-filter="all">Todos</button>
          <button data-filter="pending">Pendentes</button>
          <button data-filter="completed">Concluídos</button>
        </div>
      </div>
    </div>
  </body>
  <script src="./js/script.js"></script>
</html>
